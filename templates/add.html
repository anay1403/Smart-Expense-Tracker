<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - Finance Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header class="topbar">
            <h1>Add New Expense</h1>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Back to Dashboard</a>
        </header>

        <section class="form-card">
            <form method="POST">
                <div class="form-group">
                    <label for="description">Description (e.g., Groceries)</label>
                    <input type="text" id="description" name="description" required placeholder="What did you buy?">
                </div>

                <div class="form-group">
                    <label for="amount">Amount (&#8377;)</label>
                    <input type="number" step="0.01" id="amount" name="amount" required placeholder="0.00">
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="Grocery">Grocery</option>
                        <option value="Food">Food / Dining</option>
                        <option value="Rent">Rent</option>
                        <option value="Medical">Medical</option>
                        <option value="Others">Others</option>
                        <option disabled>--- Investing / Saving ---</option>
                        <option value="Assets">Gold / Assets</option>
                        <option value="Insurance">Insurance</option>
                        <option value="Savings">Cash Savings / FD</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="expense_date">Date <span style="font-weight:400;color:#888;">(leave blank for today)</span></label>
                    <input type="date" id="expense_date" name="expense_date"
                        max="{{ now_date }}"
                        value="{{ now_date }}">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Log Expense</button>
            </form>
        </section>
    </div>
    <script>
        // Set today's date as default
        document.addEventListener('DOMContentLoaded', function() {
            const dateInput = document.getElementById('expense_date');
            if (!dateInput.value) {
                const today = new Date().toISOString().split('T')[0];
                dateInput.value = today;
                dateInput.max = today;
            }
        });
    </script>
</body>
</html>
